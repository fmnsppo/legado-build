name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip source
        run: |
          ls -la
          unzip legado-master.zip -d source
          ls -la source/
          mv source/legado-master/* .
          mv source/legado-master/.* . 2>/dev/null || true
          rm -rf source legado-master.zip
          ls -la

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      - name: Find APK
        run: |
          echo "=== 查找所有 APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== 查看 app/build/outputs ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "apk dir not found"
          echo "=== 查看当前目录 ==="
          ls -la

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/app/debug/*.apk
